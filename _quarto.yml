project:
  type: website
  output-dir: _site
  resources:
    - CNAME
    - robots.txt
  render:
    - "*.qmd"
    - "!notes/"
    - "!drafts/"

website:
  title: "A=1 Discrete Causal Lattice"
  description: >-
    News, publications, and research artifacts for the
    A=1 Discrete Causal Lattice series.
  site-url: "https://geometryinducedphysics.org"
  repo-url: "https://github.com/JackDMenendez/dcl-website-geometry-induced-physics-org"
  repo-actions: [edit, issue]
  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Home
      - href: news/index.qmd
        text: News
      - href: roadmap.qmd
        text: Roadmap
      - text: Papers
        menu:
          - href: papers/index.qmd
            text: All papers
          - href: papers/claim-map.qmd
            text: Claim map
          - href: papers/paper-01-geometry-first.qmd
            text: Paper I — Geometry First
          - href: papers/paper-02-geometry-forces-physics.qmd
            text: Paper II — Geometry Forces Physics
      - href: artifacts/index.qmd
        text: Research artifacts
      - href: essays/index.qmd
        text: Essays
      - href: collaborators.qmd
        text: Collaborators
      - href: funding.qmd
        text: Funding
      - href: about.qmd
        text: About
      - href: bio.qmd
        text: Bio
      - href: contact.qmd
        text: Contact
    right:
      - icon: rss
        href: news/index.xml
        aria-label: News RSS feed
  page-footer:
    left: |
      © Jack D. Menendez. Site code: [MIT](/LICENSE-CODE); prose: [CC BY 4.0](/LICENSE-PROSE.md).
    center: |
      [Source on GitHub](https://github.com/JackDMenendez/dcl-website-geometry-induced-physics-org)
    right: |
      Built with [Quarto](https://quarto.org/).

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-location: right
    code-copy: true
    smooth-scroll: true
    html-math-method: katex
    anchor-sections: true
    link-external-newwindow: true
    # Social / SEO metadata. open-graph + twitter-card emit rich link
    # previews; `image` is the default social card (overridable per page).
    # social-card.png is the 1200x630 (~1.91:1) card LinkedIn/Twitter
    # prefer; bipartite-lattice.png (571x491) stays the in-page figure.
    open-graph: true
    twitter-card:
      card-style: summary_large_image
    image: /assets/social-card.png
    # Bing Webmaster Tools site-verification meta tag. Required for
    # Bing to confirm ownership before accepting the sitemap. Remove
    # this once verified if Bing supports verification-by-history;
    # otherwise leave in place — it is inert after verification.
    include-in-header:
      - text: |
          <meta name="msvalidate.01" content="30FC39A4CB5B21D9D00D3C5AD5CBF2A6" />
      # GoatCounter web analytics — cookieless, privacy-first, no consent
      # banner required. Dashboard: https://geometryinducedphysics.goatcounter.com
      - text: |
          <script data-goatcounter="https://geometryinducedphysics.goatcounter.com/count"
                  async src="//gc.zgo.at/count.js"></script>

freeze: auto
